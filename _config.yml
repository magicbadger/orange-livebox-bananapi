back_to_top_text: "Back to top"

# Plugins (allowed by GitHub Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-readme-index

# Files to exclude from the build
